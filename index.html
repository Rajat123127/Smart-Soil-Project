<!DOCTYPE html>
<html>
<head>
  <title>Smart Soil AI System</title>

  <style>
    body {
      font-family: Arial;
      background: #e8f5e9;
      text-align: center;
    }

    h1 {
      color: green;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: inline-block;
      width: 220px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      margin: 15px;
    }

    .graph {
      margin: 20px;
    }
  </style>
</head>

<body>

<h1>🌱 Smart Soil AI Monitoring System</h1>

<!-- 🌍 Region -->
<h3>Select Region</h3>
<select id="region">
  <option value="north">North India</option>
  <option value="south">South India</option>
  <option value="east">East India</option>
  <option value="west">West India</option>
</select>

<br>

<!-- 📊 Data -->
<div class="card">
  <h3>Moisture</h3>
  <p id="m">Loading...</p>
</div>

<div class="card">
  <h3>pH</h3>
  <p id="ph">Loading...</p>
</div>

<div class="card">
  <h3>Temperature</h3>
  <p id="t">Loading...</p>
</div>

<div class="card">
  <h3>🌱 Recommendation</h3>
  <p id="rec">Loading...</p>
</div>

<!-- 📊 Graphs -->
<h2>📊 Live Graphs</h2>

<div class="graph">
  <h3>Moisture</h3>
  <iframe width="450" height="260"
  src="https://thingspeak.com/channels/3307630/charts/1?dynamic=true">
  </iframe>
</div>

<div class="graph">
  <h3>pH</h3>
  <iframe width="450" height="260"
  src="https://thingspeak.com/channels/3307630/charts/2?dynamic=true">
  </iframe>
</div>

<div class="graph">
  <h3>Temperature</h3>
  <iframe width="450" height="260"
  src="https://thingspeak.com/channels/3307630/charts/3?dynamic=true">
  </iframe>
</div>

<script>

// 🤖 AI Crop Function
function getCropAI(moisture, ph, temp, region){

  let crops = [
    {name: "Rice", score: 0},
    {name: "Wheat", score: 0},
    {name: "Maize", score: 0},
    {name: "Cotton", score: 0},
    {name: "Sugarcane", score: 0},
    {name: "Millets", score: 0},
    {name: "Tea", score: 0},
    {name: "Coffee", score: 0}
  ];

  crops.forEach(c => {

    if(moisture > 600 && c.name === "Rice") c.score += 3;
    if(moisture < 300 && c.name === "Millets") c.score += 3;
    if(moisture >= 300 && moisture <= 600 && c.name === "Wheat") c.score += 2;

    if(ph >= 6 && ph <= 7 && (c.name === "Wheat" || c.name === "Maize")) c.score += 3;
    if(ph < 6 && c.name === "Tea") c.score += 3;
    if(ph > 7.5 && c.name === "Cotton") c.score += 2;

    if(temp > 30 && c.name === "Sugarcane") c.score += 3;
    if(temp < 25 && c.name === "Wheat") c.score += 2;
    if(temp >= 25 && temp <= 30 && c.name === "Maize") c.score += 2;

    if(region === "north" && (c.name === "Wheat")) c.score += 2;
    if(region === "south" && (c.name === "Rice" || c.name === "Coffee")) c.score += 2;
    if(region === "east" && (c.name === "Tea" || c.name === "Rice")) c.score += 2;
    if(region === "west" && (c.name === "Millets" || c.name === "Cotton")) c.score += 2;

  });

  crops.sort((a, b) => b.score - a.score);
  return crops[0].name;
}

// 📡 Get Data
async function getData(){

  let res = await fetch("https://api.thingspeak.com/channels/3307630/feeds.json");
  let data = await res.json();

  let last = data.feeds[data.feeds.length - 1];

  let moisture = parseInt(last.field1);
  let ph = parseFloat(last.field2);
  let temp = parseFloat(last.field3);

  document.getElementById("m").innerText = moisture;
  document.getElementById("ph").innerText = ph;
  document.getElementById("t").innerText = temp;

  let region = document.getElementById("region").value;

  // 🤖 AI Crop
  let crop = getCropAI(moisture, ph, temp, region);

  // 🌱 Fertilizer
  let fertilizer = "";

  if(ph < 6){
    fertilizer = "Add Lime";
  }
  else if(ph > 7.5){
    fertilizer = "Add Sulfur";
  }
  else if(moisture < 300){
    fertilizer = "Irrigation Needed";
  }
  else{
    fertilizer = "Use NPK Fertilizer";
  }

  let rec = "🌾 " + crop + " | 🌱 " + fertilizer;

  document.getElementById("rec").innerText = rec;
}

// Refresh every 5 sec
setInterval(getData, 5000);
getData();

</script>

</body>
</html>
